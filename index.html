    :root {
      --bg: #0a0c12;
      --surface: #12151e;
      --surface2: #1a1e2c;
      --border: #262b3d;
      --text: #dde1ef;
      --dim: #6a6f88;
      --bright: #f2f4fb;
      --accent: #4d9cf7;
      --red: #d94848;
      --orange: #d9922e;
      --yellow: #c9b83a;
      --green: #2eb86a;
      --blue: #4a82d4;
      --purple: #8a4fd4;
      --teal: #2db5a0;
      --font-body: 'IBM Plex Sans', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-size: 1rem;
      line-height: 1.6;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased

    button {
      font-family: inherit;
      cursor: pointer

      width: 6px

    ::-webkit-scrollbar-track {
      background: var(--bg)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.35
    }

    .header-glow {
      position: relative;
      overflow: hidden
    }

    .header-glow::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 25% 75%, rgba(77, 156, 247, 0.05) 0%, transparent 55%);
      pointer-events: none
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.5
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0
      }

      100% {
        background-position: 200% 0
      }
    }

    @keyframes scrollBanner {
      0% {
        transform: translateX(100%);
      }

      100% {
        transform: translateX(-100%);
      }
    }

    .block-card {
      animation: fadeSlideIn 0.35s ease both
    }

    .topic-row {
      transition: background 0.15s, opacity 0.2s;
      position: relative
    }

    .topic-row:hover {
      background: rgba(77, 156, 247, 0.04)
    }

    .topic-check {
      transition: all 0.2s
    }

    .topic-check.done {
      animation: pulse 0.3s ease
    }

    .flash-card {
      transition: transform 0.2s, box-shadow 0.2s
    }

    .flash-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3)
    }

    .flash-card:active {
      transform: scale(0.98)
    }

    .lang-btn {
      transition: all 0.15s
    }

    .lang-btn:hover {
      background: var(--surface2) !important
    }

    .lang-btn.active {
      background: var(--accent) !important;
      color: #fff !important
    }

    .tab-btn {
      position: relative;
      transition: color 0.2s
    }

    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20%;
      right: 20%;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform 0.25s ease
    }

    .tab-btn.active::after {
      transform: scaleX(1)
    }

    .progress-fill.complete {
      background: linear-gradient(90deg, #2eb86a, #4ade80, #2eb86a) !important;
      background-size: 200% 100%;
      animation: shimmer 2s ease infinite
    }

    .exam-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 700;
      font-family: var(--font-mono);
      letter-spacing: 0.5px
    }

    .labsim-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      background: rgba(77, 156, 247, 0.1);
      color: var(--accent);
      text-decoration: none;
      transition: all 0.15s;
      border: 1px solid rgba(77, 156, 247, 0.15)
    }

    .labsim-link:hover {
      background: rgba(77, 156, 247, 0.2);
      border-color: rgba(77, 156, 247, 0.3)
    }

    .chat-msg {
      animation: fadeSlideIn 0.2s ease both
    }

    @media(min-width:640px) {
      .main-wrap {
        max-width: 680px;
        margin: 0 auto
      }
    }

    @media(min-width:900px) {
      .main-wrap {
        max-width: 820px
      }
    }
  </style>
</head>
