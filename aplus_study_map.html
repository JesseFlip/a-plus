                  color:bPct===100?"#22c55e":"var(--dim)",background:"var(--surface2)",padding:"2px 8px",borderRadius:4}},bDone+"/"+block.topics.length)
              ),
              React.createElement("div",{style:{height:3,background:"var(--surface2)",borderRadius:2,marginTop:6,marginBottom:4}},
                React.createElement("div",{style:{height:"100%",width:bPct+"%",background:dc,borderRadius:2,transition:"width 0.3s"}}))
            ),

            React.createElement("div",{style:{padding:"0 14px 8px"}},
              block.topics.map(tid=>
                React.createElement("div",{key:tid,className:"topic-row",onClick:()=>toggle(tid),style:{
                  display:"flex",alignItems:"flex-start",gap:8,padding:"7px 0",
                  borderBottom:"1px solid var(--border)",cursor:"pointer",
                  opacity:completed[tid]?0.5:1}},
                  React.createElement("div",{className:"topic-check"+(completed[tid]?" done":""),style:{
                    width:18,height:18,minWidth:18,borderRadius:4,marginTop:1,
                    border:completed[tid]?"none":"2px solid "+dc+"40",
                    background:completed[tid]?dc:"transparent",
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:11,color:"#fff",fontWeight:700}},
                    completed[tid]&&"✓"
                  ),
                  React.createElement("span",{style:{fontSize:13,lineHeight:1.4,
                    color:completed[tid]?"var(--dim)":"var(--text)",
                    textDecoration:completed[tid]?"line-through":"none"}},
                    block.stars.includes(tid)&&React.createElement("span",{style:{color:dc,fontWeight:700}},"★ "),
                    t[tid]
                  )
                )
              )
            ),

            React.createElement("div",{style:{padding:"8px 14px",background:"var(--surface2)",borderTop:"1px solid var(--border)"}},
              React.createElement("div",{style:{fontSize:11,color:dc,fontStyle:"italic",lineHeight:1.4}},
                "💡 "+t[block.tipKey])
            ),

            React.createElement("div",{style:{padding:"8px 14px",borderTop:"1px solid var(--border)",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}},
              React.createElement("span",{style:{fontSize:10,color:"var(--dim)",minWidth:60}},t.confidence),
              [1,2,3,4].map(lv=>
                React.createElement("button",{key:lv,onClick:()=>setConf(block.id,lv),style:{
                  padding:"3px 8px",borderRadius:4,border:"none",cursor:"pointer",fontSize:10,
                  background:cf===lv?confColors[lv]+"30":"var(--surface)",
                  color:cf===lv?confColors[lv]:"var(--dim)",fontWeight:cf===lv?700:400,
                  outline:cf===lv?"1px solid "+confColors[lv]+"50":"none"}},confLabels[lv])
              )
            )
          );
        }),

        React.createElement("p",{style:{fontSize:10,color:"var(--dim)",textAlign:"center",marginTop:20,lineHeight:1.5,padding:"0 20px"}},t.attribution),
        React.createElement("div",{style:{textAlign:"center",marginTop:12}},
          React.createElement("button",{onClick:reset,style:{
            background:"transparent",border:"1px solid var(--border)",borderRadius:6,
            padding:"8px 20px",color:"var(--dim)",fontSize:11,cursor:"pointer"}},t.resetAll)
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
